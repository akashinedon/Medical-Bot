name: Deploy Application Docker Image to EC2 instance

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  Continuous-Integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .  
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  Continuous-Deployment:
    needs: Continuous-Integration
    runs-on: ubuntu-latest
    steps:
      - name: Pre-clean runner workspace
        run: |
          rm -rf /home/ubuntu/_diag/* || true
          rm -rf /home/ubuntu/actions-runner/_work/_temp/* || true
          rm -rf /home/ubuntu/actions-runner/_work/_actions/* || true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Free disk space on self-hosted runner
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo du -sh /var/lib/docker 2>/dev/null || true
          docker system df || true
          docker stop medical-chatbot || true
          docker rm medical-chatbot || true
          docker system prune -af --volumes || true
          docker builder prune -af || true

          # Clear OS and package caches/logs.
          sudo apt-get clean || true
          sudo apt-get autoclean || true
          sudo rm -rf /var/cache/apt/archives/* || true
          sudo rm -rf /var/log/*.gz /var/log/*.[0-9] || true
          sudo journalctl --vacuum-time=1d || true
          sudo rm -rf /tmp/* || true

          # Clear GitHub runner diagnostics/temp data that can grow over time.
          rm -rf /home/ubuntu/_diag/* || true
          rm -rf /home/ubuntu/actions-runner/_work/_temp/* || true
          rm -rf /home/ubuntu/actions-runner/_work/_actions/* || true

          # If disk is still too low, reset Docker storage completely.
          AVAILABLE_KB=$(df --output=avail / | tail -1 | tr -d ' ')
          REQUIRED_KB=$((6 * 1024 * 1024))
          if [ "${AVAILABLE_KB:-0}" -lt "$REQUIRED_KB" ]; then
            echo "Low free space after prune; resetting /var/lib/docker"
            sudo systemctl stop docker || true
            sudo rm -rf /var/lib/docker || true
            sudo mkdir -p /var/lib/docker || true
            sudo systemctl start docker || true
            sleep 3
          fi

          echo "Disk usage after cleanup:"
          df -h
          sudo du -sh /var/lib/docker 2>/dev/null || true
          docker system df || true

      - name: Run Docker Image to serve users
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO }}
          IMAGE_TAG: latest
        run: |
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker run -d \
            --name medical-chatbot \
            --restart always \
            -e PINECONE_API_KEY="${{ secrets.PINECONE_API_KEY }}" \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -p 8080:8080 \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
