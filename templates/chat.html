<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Medical Chatbot</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />
	</head>
	<body>
		<div class="bg-orb orb-a"></div>
		<div class="bg-orb orb-b"></div>
		<div class="bg-grid"></div>

		<main class="app-shell">
			<header class="chat-header">
				<div class="brand">
					<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="Medical bot" class="bot-avatar" />
					<div>
						<h1>Medical Chatbot</h1>
						<p>Smart guidance for common health questions</p>
					</div>
				</div>
				<div class="status-pill">
					<span class="status-dot"></span>
					Online
				</div>
			</header>

			<section id="messageFormeight" class="message-list" aria-live="polite"></section>

			<div class="quick-prompts">
				<button type="button" class="prompt-chip" data-prompt="I have fever, what should I do first?">Fever steps</button>
				<button type="button" class="prompt-chip" data-prompt="How can I reduce sore throat at home?">Sore throat</button>
				<button type="button" class="prompt-chip" data-prompt="When should I see a doctor for headache?">Headache warning signs</button>
			</div>

			<form id="messageArea" class="composer" autocomplete="off">
				<input
					type="text"
					id="text"
					name="msg"
					placeholder="Describe your symptoms..."
					required
				/>
				<button type="submit" id="send">Send</button>
			</form>
		</main>

		<script>
			const messageArea = document.getElementById("messageArea");
			const textInput = document.getElementById("text");
			const sendBtn = document.getElementById("send");
			const messageList = document.getElementById("messageFormeight");
			const chips = document.querySelectorAll(".prompt-chip");

			function getTimeLabel() {
				const date = new Date();
				const h = String(date.getHours()).padStart(2, "0");
				const m = String(date.getMinutes()).padStart(2, "0");
				return h + ":" + m;
			}

			function appendMessage(role, text) {
				const row = document.createElement("article");
				row.className = "message-row " + (role === "user" ? "message-user" : "message-bot");

				const bubble = document.createElement("div");
				bubble.className = "bubble";
				bubble.textContent = text;

				const meta = document.createElement("span");
				meta.className = "meta";
				meta.textContent = getTimeLabel();

				row.appendChild(bubble);
				row.appendChild(meta);
				messageList.appendChild(row);
				messageList.scrollTop = messageList.scrollHeight;
			}

			function showTyping() {
				const typing = document.createElement("article");
				typing.className = "message-row message-bot";
				typing.id = "typing-indicator";
				typing.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
				messageList.appendChild(typing);
				messageList.scrollTop = messageList.scrollHeight;
			}

			function hideTyping() {
				const node = document.getElementById("typing-indicator");
				if (node) node.remove();
			}

			async function sendMessage(rawText) {
				appendMessage("user", rawText);
				showTyping();
				sendBtn.disabled = true;

				try {
					const body = new URLSearchParams({ msg: rawText });
					const res = await fetch("/get", {
						method: "POST",
						headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
						body,
					});
					const data = await res.text();
					hideTyping();
					appendMessage("bot", data || "I could not generate a response.");
				} catch (err) {
					hideTyping();
					appendMessage("bot", "Network issue detected. Please retry in a few seconds.");
				} finally {
					sendBtn.disabled = false;
				}
			}

			messageArea.addEventListener("submit", async function (event) {
				event.preventDefault();
				const rawText = textInput.value.trim();
				if (!rawText) return;

				textInput.value = "";
				await sendMessage(rawText);
			});

			chips.forEach((chip) => {
				chip.addEventListener("click", function () {
					textInput.value = chip.dataset.prompt;
					textInput.focus();
				});
			});

			appendMessage("bot", "Hello. Share your symptoms, duration, and age group for better guidance.");
		</script>
	</body>
</html>
